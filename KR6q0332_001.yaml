body:
  text: 參學門人至柔等編師於元統辛未四月十三日入寺指山門云豁開戶牗當軒者誰喝一喝佛殿因我得禮你自倒還自起鵓鳩樹上啼意在麻畬裏據室拈拄杖云從上諸佛祖師天下老和尚總是揚蓬塵於水底摘楊華於火中新福源又作麼生卓拄杖喝一喝拈廣教府疏云老瞿曇二千年前未了底公案珙上座今日就廣教府官手裏與他了却呈疏云所供詣實拈山門疏云鍋子大小杓柄短長自家裏事何必論量指法座云人天寶座曲彔木床我今要坐即便坐更不作禮須彌王便升座拈香祝聖畢次拈香云此一瓣香爇向爐中奉為前住湖州路道場禪寺及菴大和尚用酬法乳之恩乃云把住也鋒芒不露放行也十字縱橫水雲深處相逢却在千峰頂上千峰頂上相逢却在水雲深處今朝福源寺裏開堂演法昨日天湖菴畔墾土耕煙所以道法無定相遇緣即宗可傳真寂之風仰助無為之化正與麼時如何拈拄杖卓一下云九萬里鵬才展翼一千年鶴便翱翔復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人師云只如今日山僧是為人也不為人也若道為人則屈著三聖若道不為人則屈著興化且作麼生得恰好去擊拂子云戎夷蠻貃分諸國總在吾皇化育中當晚小參現前一衆久在叢林謂之參禪謂之辦道殊不知一念未生已前更無別物才擬心時錯了也雪峰和尚三登投子九到洞山如渴鹿趂陽焰不知費了多少腳頭如今要得現成直下自家看取復有何事無事切莫妄求妄求而得終非得也復舉南泉和尚道自小牧一頭水牯牛擬向溪東牧未免食他國王水草擬向溪西牧亦未免食他國王水草不如隨分納些些總不見得頌云南泉放牧沒東西兩岸春風緑草齊總是國王家水土不如隨分納些些結制上堂四月十五日已前夜短睡不足四月十五日已後日長饑有餘正當四月十五日福源寺裏禪和子粥亦足飯亦足睡亦足游戲圓覺伽藍安居平等性智敢問諸人因甚得到這般田地熏風入戶自生凉湖水到門非有意謝專使并三塔和尚首座都市上堂睦州唆臨濟喫棒不是好心楊岐逼慈明晚參不是好心趙州訪道吾不是好心福源專使逼人住院且道是好心不是好心珊瑚枕上兩行淚半是思君半恨君上堂若論此事如農夫耕田相似耕之以深種之以時所收必豐輸官奉己之外綽綽有餘者無他力乎精勤而已耕之不深種之非時所收必寡輸官奉己不足者亦無他困於怠墮而已然而不責自己怠墮所需匱之而反妬他人精勤而得之多斯等人名為可憐憫者福源說話意在於何不圖打草且要驚蛇謝殿主淨頭上堂一身清淨則多身清淨一世界清淨則多世界清淨東司頭臭氣佛殿裏蓬塵從什麼處得來以手掩鼻云又有一點也上堂三月安居一月過園林是處緑陰多蛙聲只在池塘裏試問禪流會也麼此方真教體清淨在音聞觀音菩薩將錢買胡餅放下却是饅頭擊拂子云打還他州土麥唱歌須是帝鄉人散青苗會上堂天得一以清地得一以寧聖人得一天下和平衲僧得一事事現成拈拄杖云拄杖子得一任運騰騰晚來縱步東湖上笑指禾苗一色青復舉溈山開田次仰山云這頭得恁麼低那頭得恁麼高溈云水能平物但以水平仰云水也無憑但高處高平低處低平溈山然之頌云片段高低總是田溈山父子見何偏福源手不沾泥水坐看禾收勝去年解制小參不觸事而知金井欄邊絡緯啼不對緣而照明月堂前秋已早統無邊剎境為一微塵無一塵不是大圓覺海融十世古今作箇念頭無一念不是自恣時節便與麼去不涉程途況乃橫檐拄杖緊峭草鞋足跡四方鄉關萬里謂之游江海涉山川尋師訪道為參禪盡是癡狂外邊走更饒你跳上三十三天一剎那間遊遍百億須彌盧百億香水海拈拄杖卓一下云也離不得這裏解制上堂今朝七月十五凉風開我竹戶嶺上一片兩片白雲被他吹得七橫八竪輕飄飄浮逼逼欲散不散欲聚不聚老僧招手向白雲白雲白雲何不住到頭終是覔山歸流落天涯與途路喝一喝中秋謝藏主上堂天上月正圓人間月方半諸人恐未知打鼓普請看道是如來藏裏摩尼珠又似賓頭盧尊者手中琉璃碗比也不可比辨也不可辨天風吹露濕桂華香浸雲邊廣寒殿上堂達磨居少林九年面壁墻塹不牢疏山賣布單千里見人路頭繁雜福源這裏墻塹堅牢路頭平直諸人每日行在正路上行住在穩密處住中間一片田地因甚踏不著復舉僧問古德如何是清淨法身古德云家無小使不成君子師云諸禪德古人與麼答話大似認奴作郎今日忽有人問福源如何是清淨法身只對他道家無二主臘八上堂只在山中多少好無端走入閙籃來衆生福薄難調制一點明星是禍胎上堂我有一句子欲與諸人說破又恐諸人罵我不與諸人說破又恐諸人疑我且如今說即是不說即是撫膝云知我罪我我無辭焉解制上堂九旬同禁足自恣是今朝暮雨青燈寺西風白石橋孤身三事衲萬里一輕包若到溈山處須防笑裏刀除夜小參年亦窮月亦窮三十六旬窮伎倆破除全在五更鐘窮則變變則通尋常一樣窗前月才有梅華便不同三條椽下禪和子囊亦空鉢亦空拾得斷麻穿破衲不知身在寂寥中惟有福源拄杖子不屬陰陽造化功了無春夏秋冬自古自今撑天拄地同行同坐嘯月吟風又誰管你江湖滾滾日月匇匇等閒靠在禪床角一片雲中掛黑龍歲朝上堂鏡清道新年頭佛法有明教道新年頭佛法無道是有也未必有道是無也未必無張公喫酒李公醉趙州東壁掛胡蘆上堂春風開竹戶夜雨滴華心一一與諸人發向上機演第一義因甚不知良久云莫怪山僧太多事光陰似箭暗相催元宵謝東班殿主并無念西堂上堂進以禮退以禮天地與我同根萬物與我一體爛生薑陳皂角舊笊籬破木杓東頭賣賤西頭賣貴有利無利不離行市夜來無位真人提金剛圈點飛龍馬走遍四天下却與寰中和尚在蟭螟眼裏共賞元宵天曉起來依然即在赤肉團上卓拄杖一下云我見燈明佛本光瑞如此佛涅槃上堂七十九年賣弄脫空二月十五一場合殺直饒藏得渾身未免露出雙腳百萬人天雲散水流丈六金身煙消火滅迦葉自歸雞足山魔王嫉妬心方歇諸仁者要見釋迦老子麼卓拄杖一下云遍地春風桃李華紅者自紅白者白上堂知見立知即無明本知見無見斯即涅槃春山疊亂青春水漾虗碧寥寥天地間獨立望何極拈拄杖云放過釋迦老子卓拄杖云穿却雪竇鼻孔良久云劒為不平離寶匣藥因救病出金瓶浴佛上堂舉世尊初生下一手指天一手指地周行七步目顧四方乃言天上天下唯我獨尊頌云指天指地日吧吧傍若無人自說誇有意氣時添意氣滿園香霧濕枇杷結制小參明朝結制今夜小參福源不是琅玡點出五般病西院商量兩箇錯一夏九十日諸人不得妄動一步一日十二時諸人不得妄起一念不起一念而即證無生不動一步而遍遊沙界如斯履踐無一日不是安居自能笑傲林泉誰管坐消歲月才與麼便不與麼不見雲門和尚道直得盡乾坤大地無纖毫過患始是轉句不見一法猶是半提更須知有向上全提時節卓拄杖一下云我愛夏日長人皆苦炎熱結制上堂諸人未結制已前天台南嶽峨眉五臺要去便去要來便來因甚結制已後頂笠腰包草鞋拄杖總用不著咄莫道布袋頭不在山僧手裏好上堂十五日已前夜短睡不足十五日已後日長饑有餘正當十五日飯白如雪扇團似月打扇喫飯猶嫌道熱釋迦老子道知足之人雖臥地上猶為安樂不知足者雖處天堂亦不稱意又道假使百千劫所作業不忘因緣會遇時果報還自受灼然灼然善惡若無報乾坤必有私復舉東印土國王請般若多羅齊次乃謂祖曰諸僧皆轉經惟師為甚不轉經祖曰出息不涉衆緣入息不居陰界常轉如是經百千萬億卷豈止一卷兩卷師云諸禪德般若多羅與麼答話醫得眼前瘡剜却心頭肉若有人問福源諸僧皆轉經長老因甚不轉經只對他道白日窗前青宵月下要轉便轉要罷便罷且道與般若多羅還有優劣也無若檢點得出許你具一隻眼及菴和尚忌日拈香有來由沒巴鼻建陽山西峯寺蒲團頭拾得底無眼無耳無頭無尾道是一塊兜樓嗅著又無香氣家醜不可外揚明人不作暗事上堂黃梅俾老盧踏碓石頭譏藥山不為有一丈蓬可以使八面風無三尺鞭難以控千里馬伊蘭園裏不生旃檀黃蘗樹頭有甚蜜果上堂動若行雲止猶谷神水中醎味色裏膠青細雨濕衣看不見間華落地聽無聲上堂神光不昧萬古徽猷但從己覓莫向外求養雞意在五更頭上堂所聞不可聞所見不可見昨夜五更風吹落桃華片蒼苔面上生紅霞百鳥不來春爛熳上堂我本山林拙比丘等閒來此伴禪流縱饒相聚人情好那箇人情得到頭休休休緑霧紅霞千嶂錦西風黃葉一天秋上堂月出海門東金波浩渺渺圓又圓不虧明又明得好寄語白兔翁說與嫦娥道收彩不宜遲潛光須及早莫待黑雲四面來一天光彩都無了世間惟有道人心歷劫至今常皎皎謝藏主上堂今朝八月一十五樹凋葉落金風露野狐窟宅梵王宮狗子尾巴書卍字大藏小藏從何來拈拄杖云盡從這裏流將去等閒道箇鉢囉娘截斷古今閒露布上堂一日一日復一日二三四五八九十數到紅殘緑暗時人間又是四月一朝悠悠暮悠悠滿目毗盧藏海棄之認一浮漚休休修心未到無心地萬種千般逐水流上堂喫飯要止饑飲水要止渴著衣要免寒歸鄉要到家學道要到三世諸佛開口不得處參禪要到天下祖師插腳不入處若不如此倚他門戶傍他墻壁聽人指揮喫人㖒唾總不丈夫福源與麼說話良藥苦口忠言逆耳空巖印首座至上堂睦州唆臨濟問黃蘗佛法大意三度六十拄杖口乃招禍之門還有免得此過者麼良久云空生巖下坐天雨四華來上堂六月七月天不雨農夫曉夜忙車水背皮焦裂腳底疼眼華無力欲悶死公人又來逼夏稅稅絲納了要盤費大麥小麥盡量還一日三餐不周備思量我輩出家兒現成受用都不知進道身心無一點東邊浪蕩西邊嬉三箇五箇聚頭坐開口便說他人過及乎歸到暗室中背理虧心無不做莫言墮在異類中來生定作栽田翁前來所說苦如此那時難與今時同古德訓徒有一語對人天衆拈來舉緇田無一簣之功鐵圍陷百刑之苦上堂佛法無人說雖慧莫能了開口便不是我宗無語句亦無一法與人不開口也不是五馬不嘶一牛飲水開口不開口總不是仁者見之謂之仁智者見之謂之智上堂百丈教人開田通身泥水佛眼俾僧修造滿地木楂楊岐逼慈明晚參成人不自在趙州教嚴陽放下自在不成人福源與麼道也是為他閒事長無明上堂是聖是凡入門便見波斯鼻孔開眼便見蚌蛤心肝開口便見諸人兩莖眉毛橫在面上因甚看他不見明眼人前三尺暗病起上堂舉苕溪和尚示衆云吾有大病非世所醫後有僧問曹山未審是甚麼病山云攢簇不得底病又問一切衆生還有此病也無山云老僧正覓起處不得師云這僧是病過的人極是搜尋得到頭髮尖裏也不放過若非曹山知他落處其他難為啓口復成一偈舉似大衆百骨酸疼攢簇難一番熱了一番寒覔他起處竟不得藥銚風爐盡打翻冬節小參洞山掇退果卓取捨未忘玉泉不洗布裩固執難斷福源寺是箇般時節就中却不同梅放孤標依舊暗香浮動線添寒影又逢佳景迎春燈籠裹帽水底吹笙露柱著衫雲中作舞是汝諸人還委悉麼一百五日是清明清明更在寒食後復舉僧問古德如何是冬來意德云京師出大黃頌云有問冬來意京師出大黃地爐深夜火茶熟透瓶香謝都寺冬齊并維那上堂一一遍一切一切遍一一香積世界以香飯為佛事南閻浮提以音聲為佛事東勝神州打槌西瞿耶尼普請懷州牛喫禾益州馬腹脹粗餐易飽細嚼難饑只恐不是玉是玉也大奇及菴和尚忌日拈香云沒興相逢處西峰與建陽不平多少事盡在一爐香歲旦上堂鐘樓上念讚床腳下種菜勝首座道猛虎當路坐福源這裏山門頭賀正歌唱佛殿裏祝聖𮘗經一種是聲無限意有堪聽有不堪聽諸人還曾檢點得出麼喝一喝下座元宵上堂南閻浮提以音聲為佛事十方俱擊鼓十處一時聞福源寺裏上堂西林寺裏一一聽得西林寺裏念佛福源寺裏一一聽得讚嘆也獲一分功德毀謗也獲一分功德一即一切一切即一鸚湖市上做元宵因甚東家點燈西家暗坐你也理會不得我也理會不得冷水浸冬瓜大家相淈𣸩佛涅槃上堂身口意清淨是名佛出世身口意不淨是名佛涅槃人情不能恰好世界難得團欒晝長夜短秋熱冬寒一把柳絲收不得和烟搭在玉闌干聖節上堂蟠桃三千年華開聖人五百歲出現拈拄杖云蟠桃華開也卓拄杖云聖人出現也靠拄杖云天下太平結制上堂福源今日結制不得不為諸人議定第一從朝至暮舉足下足不得踏著常住地若踏著常住地定犯著波羅夷罪第二十二時中不得向鼻孔裏出氣若向鼻孔裏出氣定犯著波羅夷罪第三件事且莫說且莫說留在七月十五日也未遲甕裏何曾走却鱉上堂日日日東出日日日西沒出沒知幾回又是五月一咄哉門外人把手牽不入拽杖獨歸來門開空嘆息示衆古德道結夏半月日了也水牯牛作麼生有者道結夏半月日了也寒山子作麼生福源道結夏半月日了也己躬下事作麼生莫是早晨起來洗面洗面了喫粥喫粥了喫飯喫飯了放參放參了打眠是己躬下事麼莫是東廊上西廊下寮舍裏山門頭鼓扇是非是己躬下事麼莫是看諸子百家長篇短章高談濶論傍若無人是己躬下事麼莫是經卷上搏量語録上卜度未得謂得未證謂證是己躬下事麼莫是禮幾拜佛看幾卷經燒兩箇指頭燃幾炷頂香誑惑世人希求利養是己躬下事麼莫是長連床上閉眉合眼昏昏沉沉懵懵懂懂空過時節是己躬下事麼如此反不及三家村裏拖鋤頭漢栽田種地養口資身却無罪過我輩沙門釋子仗如來慈蔭不耕而食不蠶而衣高堂大廈廣殿修廊十指不沾水百事不干懷種種現成般般便當只為現成只為便當却乃縱情放逸非法貪求不修僧業不清戒律不明因果不畏罪福寬裏做債造地獄因閻家老子沒人情無面目一善一惡主籍分明一發與你打算莖虀粒米滴水寸絲盡要酬還福源與麼告報也是為他閒事長無明上堂一塵起大地收四月十五日結却布袋頭一葉落天下秋七月十五日解却布袋頭正當自恣何證何修草鞋底北單越拄杖頭南贍部洲朝悠悠暮悠悠無拘無束自在自由老豐干忽然出來道我與汝同往五臺禮文殊又且如何搖手云你不是我同流中秋上堂黑月難見白月易見黑白未分已前眼見何如心見所以道見見之時見非是見見猶離見見不能及卓拄杖云昨夜蟾宮桂子開好風吹下天香來昭王白骨埋青草無人為掃黃金臺上堂澄一念虗明未脫三乘羈鎖認八處出現正迷自己靈光直饒平白地上轉身荊棘林中移步腳跟下好與三十棒何故不因樵子徑爭到葛洪家天壽聖節上堂箕翼長明地天長泰風不鳴條雨不破塊君乃堯舜之君俗乃成康之俗王母晝夜雲旗翻海山四月蟠桃熟上堂十月初一日開爐諸方說寒道熱福源一味尋常不會安排施設深深埋兩箇炭團滿滿堆一爐黃葉莫嫌火種無多只要暖氣相接放下重簾密糊窗縫又誰管你屋上濃霜庭前深雪但得自家屋裏一團和氣外邊冷言冷語不須聽由他自歇諸禪德本色住山人且無刀斧痕上堂一心不生萬法無咎無咎無法不生不心所以道山僧居菴時只見居菴時境界門對千峰心閒一境朝看白雲冉冉暮聽流水潺潺煮藜藿于折腳鐺中穿破衲于尖頭屋下自由自在無束無拘娑羅樹影落天湖簷萄華香浮臺石是非不到名利杳忘住院時即見住院時境界門連湖市地接海州早起晏眠迎來送去整規模于顛危之際聚衲子于寂寞之中漁歌牧笛長聞山色溪光罕見紅塵滾滾白日匇匇且道住湖寺居山菴是同是別良久云無山不帶雲有水皆含月祈雨上堂記得去年時五月火雲燒田天不雨家家插種望今年不料今年又如此偉哉公矦將相心憂民切切如憂己叩之龍神便感靈來此閻浮澍甘雨霈然不止三日霖天人羣生悉歡喜敢問諸人且道承誰恩力以拂子擊禪床云蘇嚕蘇嚕㗭哩㗭哩復舉僧問乾峯十方薄伽梵一路涅槃門未審路頭在甚處峰以拄杖劃一劃云在這裏僧舉似雲門門拈起扇云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾頌云萬仞龍門一拶開傾盆驟雨假風雷袈裟打濕歸來看半是紅雲半海苔上堂鴆毛毒未是毒算來不似人心毒三伏熱未是熱思量無出人心熱阿修羅王常好罵天善星比丘偏要謗佛道高一尺魔高一丈汝之伎倆有盡我之不採無窮七月旦上堂人間秋十日湖寺便生凉竹色溪邊緑荷花鏡裏香即心猶未是作境謾搏量空劫已前事今朝為舉揚解制上堂有佛處不得住樓臺月色雲收去無佛處急走過池塘荷葉風吹破三千里外逢人不得錯舉朗州山澧州水四海五湖皇化裏腰包頂笠萬千千問著盡言山與水忽有不甘底出來道山但言山水但言水有甚麼過良久云未可全拋一片心逢人且說三分話上堂行腳高人說箇參禪說箇辦道恰如坐在飯籮裏呌肚饑相似通身是飯你自不肯喫又干他別人甚麼事十二時中動轉施為全是一條潑天大路且無荊棘瓦礫礙汝腳跟下你自不肯進步又于他別人甚麼事諸佛有甚麼勝如凡夫凡夫有甚麼不如諸佛彼既丈夫我亦爾何得自輕而退屈驀拈拄杖云如來說一合相即非一合相明月蘆華何處尋想伊只在秋江上中秋上堂初三月十五月缺時無圓圓時無缺圓缺不相干清光常皎潔昨夜蟾宮雨露多天風吹落黃金屑復舉嚴陽尊者問趙州一物不將來時如何州云放下著嚴云一物不將來放下箇甚麼州云放不下擔取去頌云香飄桂子十分月雨滴芙蓉一半秋門外任他時節換穩將衲被自蒙頭上堂學道參禪心地未明己眼未開情塵未脫命根未斷恰如甚麼相似恰如有眼人步入千年暗室中相似目前雖有一切物色相傾竟不知其是青是黃是赤是白是長是短是方是圓懵然無知黑漫漫地若如此在袈裟下如何消得人天供養學道參禪心地已明己眼已開情塵已脫命根已斷恰如甚麼相似恰如大海底輥出一團紅日相似千年暗室一照照破目前所有一切種種物色青黃赤白長短方圓一一明了一一分曉那時正好向二條椽下七尺單前長養聖胎閒閒度日若如此在袈裟下方始消得他人天供養然雖如是更須知道福源門下一條生鐵門檻高而無上廣莫可測在外者要入不能得入在內者要出不能得出也須是著些精彩用些氣力跳過始得若也擬議不是撞頭磕腦便是墮坑落塹莫言不道臘八上堂雪山高且深忍凍吞麻麥如此過六年酌然是快活無端覩明星剛言成正覺拂袖下山來早是低一著更云度衆生重重露拴索看他世上榮何似山中樂錯錯年年有箇臘月八入新僧堂上堂直為柱曲為梁矩中圓規中方匠氏取材之良也歸其圓泯其方捨其短取其長主人立法之妙也所以福源僧堂建柱石于丙子之孟春畢斧斤于戊寅之重九六窗炯炯洞一色之虗明萬瓦鱗鱗絶三種之滲漏低頭不見地還他擔板禪和仰面不見天却許蒙頭衲子老竹溪豈止一生行願憍陳如頓增萬倍威光遵行百丈叢林壯觀千年常住直得十方諸佛異口同音宣說偈言佛子住此地則是佛受用常在於其中經行及坐臥又有龐居士說箇頌子讚嘆云十方同聚會箇箇學無為此是選佛場心空及第歸然雖如是其奈張無盡忍俊不禁出來道汝等諸人即解樹頭喫果子不知樹曲彔殊不知作此堂者有損有益居此堂者有利有害這般說話也怪伊不得何故人無遠慮必有近憂此事且拈放一邊祇如衲僧自己分上得力句子作麼生道良久云饑餐渴飲渾無事聽雨聞風間打眠開爐上堂法昌和尚道法昌今日開爐行腳僧無一箇惟有十六高人緘口圍爐打坐福源不與麼道福源今日開爐炭墼也無一箇五湖四海禪和衲被蒙頭打坐不是冷眼傍觀免見挑灰弄火寬心寧耐到春來屋外梅花香朵朵冬節小參諸禪德如今是甚麼時節羣陰欲去未去一陽欲來未未陰不得為陰陽不得為陽山不得為山水不得為水日月星辰六十甲子一齊打亂沒商量處水泄不通無奈何時放開一線便見地中雷復律管灰飛𦦨發冰河笋抽寒谷依舊山即是山水即是水日月星辰六十甲子各歸舊位是法住法位世間相常住卓拄杖下座冬節上堂昨夜陰回陽復爻曉來湖岸見冰消皇宮日影喜添線胡地笋長梅破梢春漏一痕舒柳眼雲拖五色束天腰明明空劫已前事不是虗言誑爾曹上堂臘月一水生骨虗明自照不勞心力白鷗寒鴈蘆花無處尋他踪跡待得日暖冰融水面寬依舊飛來照破碧光碧復舉麻谷至章敬繞禪床一匝振錫一下卓然而立敬云是是又至南泉繞禪床一匝振錫一下卓然而立泉云不是不是谷云章敬道是和尚因甚麼道不是泉云章敬是是汝不是此是風力所轉終歸敗壞輒成一頌普告人天尺可量兮稱可平短長輕重要分明都盧祇是一雙手難掩世間人眼睛九皋學士至上堂諸佛廣大門風祖師向上巴鼻初非明悟見知而可擬議又非世智辨聰而能髣佛直使盡天下衲僧捫摸他不著亦不令住在無捫摸處有此大丈夫氣槩方能成辦大丈夫事此非一生兩生行願得成乃是多劫多生淨業增熏方能如此無一法從懶墮懈怠中生豈不見二祖立雪五祖栽松六祖踏碓仰山牧牛雪峯在德山做飯頭踈山賣了布單三千里外行腳長慶坐破七箇蒲團香林侍雲門一十八年張無盡一宿龍安黃太史十遊幕阜裴丞相悟心於黃蘗言下龐居士得旨於馬祖室中先輩大儒古來老衲是皆苦志勞形究明此道豈似如今禪和家華居豐食致身於叢林中視叢林如驛舍口裏說道參禪辦道聞說禪道如風過樹此等名為可憐憫者我此現前一衆宿因深正得在此處清淨伽藍同居共處當生希有難遭之想豈可也學他今時流輩荒逸終日無所用心逐隊隨羣說黃道黑略無少念回光返照我今此身四大和合所謂毛髮爪齒皮肉斤骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處若向這裏回光返照著得一隻眼便見應菴和尚道若作地水火風商量釋迦老子盡塵沙劫無出頭分不作地水火風商量如將魚目擬比明珠二途不涉何異𦘕餅充饑山僧與麼舉揚有智若聞則能信解無智疑悔則為永失復舉東坡夜宿東林與照覺道話有省呈頌云溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人師云諸仁者我觀王公大臣好此道極多至於談道之際箇箇喜人順己怕人針劄所以東坡居士被照覺活埋在聲色堆裏至今無出身路翰林九皋學士來我山中清話連日述偈數篇等是一種語言三昧中未曾道著元字腳祇這便是出他古人一頭地了也乃撫膝云鶴有九臯難翥翼馬無千里謾追風除夜小參北禪分歲三代禮樂全該王老燒錢一種杯盤狼籍珙上座固守清貧兼逢歉歲難與諸方鬬富從年頭直至年尾共諸人同家共活豐儉隨宜終不陪面去借地栽花虗粧好漢且就自家屋裏量水打碓免見求人但每日二時牽補得過便可塞住持之責古人有言時挑野菜和根煮旋斫青柴帶葉燒不是爺貧連子苦免教家富小兒嬌歲旦上堂新年頭說話舊年裏不同舊年裏說話新年頭不同秦山雪解湖岸冰融髮從今日白華是去年紅元宵上堂山堂兀坐思悠悠節令推遷莫暫留新歲始聞歌鼓吹元宵又見挂燈毬心田荊棘參天長業海波濤滾底流不向死前先畫䇿草根從自鎖枯髏上堂報緣虗幻豈可強為浮世幾何隨家豐儉淡靜生涯水一湖寂寞相從雲數片思量誰是箇般人獨自舉頭天外看擊拂子下座二月旦上堂道遠乎哉觸事而真自携瓶去沽村酒却著衫來作主人聖遠乎哉體之則神但見落花隨水去不知流出洞中春要識肇法師麼豎起拂子云枇杷葉是馬家親眼裏無筋一世貧上堂春眠不覺曉處處聞啼鳥夜來風雨聲花落知多少世尊三昧迦葉不知迦葉三昧阿難不知山僧三昧諸人不知所以道諸法無作用亦無有體性是故彼一切各各不相知雖各不相知諸法元無二便與麼去苦樂逆順道在其中若不然者柳絮隨風自西自東卓拄杖下座聖節上堂盡大地是國王水土無一物不受王恩盡十方是古佛道場無一日不為佛事莫有知恩報恩者麼下座同詣大雄寶殿啓建天壽聖節上堂收足上蒲團坐一參禪則易伸手展鉢盂喫三厨粥則難夜短眠不足日長饑有餘置而勿論你道賓頭盧走入僧堂裏與憍陳如商量箇甚麼事良久云縱然為客好爭似在家貧結制上堂今朝四月十五日行腳師僧念頭息草鞋乾晒待秋風金錫罷遊留靠壁鸕偏愛守空池鳳凰豈肯棲荊棘平生肝膽向人傾相識猶如不相識聖節滿散上堂天下無二道混四海而為一家聖人無二心視百姓猶如一子所以道心同虗空界示等虗空法證得虗空時無是無非法如天普蓋似地普擎元元自化蕩蕩難名好諸禪德但見皇風成一片不知何處是封疆平山和尚至上堂即心即佛也不是非心非佛也不是不是心不是佛不是物也不是恁麼也不是不恁麼也不是恁麼不恁麼總不是子細看來直教你無用心處正好用心卓拄杖云藕穿平地為荷葉笋過東家作竹林復舉芙蓉訪實性大師以右手拈拄杖安左邊良久云若不是芙蓉師兄也大難委悉師云諸仁者實性大師聞名富貴見面貧窮自家骨肉相看也只作路岐相待今日平山法兄久出歸來福源雖則囊空槖虗未免將無作有卓拄杖云人情淡處道情濃尉斗煎茶銚不同回院上堂老牯偷間去半年祖翁田地草芊芊歸來懶更重還債犁杷春風又上肩是即是祖禰不了逃難逃宿業拘牽四蹄耕白水兩角指青天拍膝一下云可惜無人知此意風前令我憶南泉退院上堂卸却項上鐵枷揚下手中木杓合眼跳過黃河騰身衝開碧落獅子躍倒玉闌干象王擺壞黃金索白雲兮處處相逢青山兮步步踏著喝一喝云舉頭天外看誰是箇般人示衆云吾佛世尊有四種清淨明誨所謂攝心為戒因戒生定因定發慧云何攝心何名為戒若諸世界六道衆生其心不淫則不隨其生死相續又道若不斷淫修禪定者如蒸砂石欲其成飯經百千劫祇名熱砂何以故此非飯本砂石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三途必不能出又道若不斷殺修禪定者譬如有人自塞其耳高聲太呌求人不聞此等名為欲隱彌露清淨比丘於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食名為釋子又道若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生又道若諸世界六道衆生雖則身心無殺盜淫三行已圓若大妄語則三摩地不得清淨如刻人糞為旃檀形欲求香氣無有是處淫殺盜妄既已消亡戒定慧學自然清淨若太虗之雲散如大海之波澄得到這般田地了方可以參禪方可以學道你且道禪又作麼生參道又作麼生學從上以來多有樣子福源不惜口嘴略舉數段二祖初到少林參禮達磨斷臂立雪悲泣求法達磨曰諸佛最初求道為法忘形汝今斷臂求亦可在二祖曰諸佛法印可得聞乎達磨曰諸佛法印匪從人得二祖曰我心未安乞師安心達磨曰將心來為汝安二祖曰覔心了不可得達磨曰我為汝安心竟二祖於此悟入這箇便是為法忘軀參禪學道第一樣子大梅常禪師參問馬祖如何是佛祖曰即心是佛常領旨直入大梅山卓菴後馬祖聞之令僧去問曰和尚見箇甚麼道理便住此山常曰馬祖向我道即心是佛我向這裏住僧曰馬祖佛法如今又別了也常曰作麼生別僧曰如今又道非心非佛常曰這老漢惑亂人未有了日在任他非心非佛我只管即心即佛其僧回舉似祖祖曰梅子熟也這箇便是有決定信無疑惑心參禪學道第二箇樣子臨濟初在黃蘗會下行業純一首座問曰上座在此多少時也濟曰三年首座曰曾參問也無濟曰不曾參問不知問箇甚麼首座曰汝何不去問堂頭和尚如何是佛法的的大意濟便去問聲未絶蘗便打如是三度發問三度被打濟白座云幸蒙慈悲令某問話三度發問三度被打自恨障緣不領深旨今且辭去座云汝若去時須辭方丈去座先到方丈云問話底後生甚是如法若來辭時方便接他向後成一株大樹與天下人作陰凉去在濟去辭蘗云不得往別處向高安灘上大愚處去濟到大愚愚問甚麼處來濟云黃蘗處來愚云黃蘗有何言句濟云某甲三度問佛法的的大意三度被打不知某甲有過無過愚云黃蘗與麼老婆為汝得徹困更來這裏問有過無過濟於言下大悟云元來黃蘗佛法無多子愚搊住云這尿牀鬼子適來道有過無過如今却道黃蘗佛法無多子你見箇甚麼道理速道速道濟於大愚肋下築三拳愚托開云汝師黃蘗非干我事濟辭大愚却回黃蘗蘗見來便問這漢來來去去有甚麼了期濟云祇為老婆心切蘗問什麼處去來濟云昨蒙慈旨參大愚去來蘗云大愚有何言句濟遂舉前話蘗云作麼生得這漢來待痛與一頓濟云說什麼待來即今便喫隨後便掌蘗云這風顛漢却來這裏捋虎鬚濟便喝蘗云侍者引這風顛漢參堂去這箇便是宿因深正有大根器參禪學道第三箇樣子長慶稜禪師未悟時看箇驢事未去馬事到來如是在雪峰玄沙往來三十年坐破蒲團七箇一日捲簾豁然大悟便說箇頌子道也大差也大差捲起簾來見天下有人問我解何宗拈起拂來劈口打這箇便是不肯造次承當必欲見大休大歇田地參禪學道第四箇樣子仰山在百丈會下問一答十口吧吧地百丈曰汝已後去遇人在後到溈山處溈問曰承聞子在百丈問一答十是不仰云不敢溈云佛法向上一句作麼生道仰擬開口溈便喝如是三問仰三擬答三被喝仰低頭垂淚云先師道教我更遇人始得今日便遇人也遂發心看牛三年一日溈山見仰在樹下坐禪溈以拄杖點背一下仰回首溈云寂子道得也未仰云雖道不得且不借別人口溈云寂子會也這箇便是去却知解真實參禪學道第五箇樣子保寧勇禪師初入天台教更衣謁雪竇顯禪師顯以為堪任大法乃熟視呵之曰央庠座主勇發憤下山望雪竇山禮拜曰我此生行腳參禪道不過雪竇誓不歸鄉便往泐潭踰年疑情未泮後參楊岐頓明心地岐沒更從同參白雲端研極玄奧這箇便是具決定志無退轉心參禪學道第六箇樣子雲峰悅禪師在大愚芝座下一日芝示衆曰大家相聚喫莖虀喚作一莖虀入地獄如箭悅聞之駭然便上方丈請開示芝曰法輪未轉食輪先轉後生家趂色力健何不為衆乞食我忍饑不暇何暇為汝說禪乎悅不敢違未幾芝遷翠巖悅納疏罷復過翠巖求開示芝曰佛法不怕爛却今正雪寒可為衆乞炭悅亦奉命化炭歸復上方丈請益芝曰堂司即目缺人今已煩汝悅受之不樂恨芝不去心一日後架桶篐忽散自架墮落豁然大悟頓見芝用處急趨方丈芝見來笑曰且喜維那大事了畢悅不措一詞禮拜了退這箇便是為衆竭力不廢寸陰參禪學道第七箇樣子更有第八箇樣子此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法卓拄杖一下下座結制小參佛祖門風將委地說著令人心膽碎扶持全在我兒孫不料兒孫先作弊紛紛走北又奔南昧却正因營雜事滿目風埃滿面塵業識茫茫無本據縱饒挂搭在僧堂直待板鳴歸被位聚頭寮舍鼓是非收足蒲團便瞌睡癡雲靉靆性天昏石火交煎心鼎沸暫時寂寂滯輕安一向冥冥墮無記百丈清規不肯行外道經書勤講議因果分明當等閒罪福昭然渾不懼或遷一榻一間房放逸總由身口意頭上瓦腳下磚身上衣口中味一一皆出信心檀越人家施未成道業若為消捫心幾箇知慚愧今日三明日四閒處光陰盡虗棄一朝老病來相尋閻翁催請死符至從前所作業不忘三塗七趣從茲墜袈裟失却復再難鱗甲羽毛披則易看他古之學道流直忘人世輕名利煮黃精煨紫芋飯一摶水一器為療形枯聊接氣石爛松枯竟不知洗心便作纍生計物外清間一味高世上黃金何足貴劫空田地佛華開香風觸破娘生鼻選佛場中及第歸圓覺伽藍恣遊戲茲因結制夜小參不覺所言成此偈
