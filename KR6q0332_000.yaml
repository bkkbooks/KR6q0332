body:
  text: 福源石屋珙禪師語録原序昔達磨大師壁觀少林惟以一言傳心默示真體使人自證初無多説是以二祖夙慧天稟頴悟超然故於密授之際直證其妙乃曰了了常知言不可及達磨始印之曰即此是自性清淨心更勿疑也其後四世相傳皆默證其體而不顯言至荷澤神會禪師則記達磨有懸絲之讖慮恐宗旨滅絶遂明説知之一字衆妙之門至是而真心之體顯白於世潛符密契者不為不多矣然而此心之知虗靈寂照性自神解非世所謂仗境託緣之知而為其體也自唐以來諸祖相傳列派分宗行棒行喝至於擎叉舞笏挽弓輥毬各立玄門建化不一究其大機大用無非直顯心體之妙至不得已而有上堂入室示衆等語觀其激揚開導要皆肆口而説直截無隱始及南宋以後諸師漸乃組章繪句流為造作甚至有短拙新巧之論使學語無稽之徒轉相沿襲大為有識所恥殊不知直指之道以心傳心必惟自證才涉言詮即第二義而況務為造作者耶余每與通宗達士語至於此未嘗不為之大息焉福源住山石屋珙公早得及菴之傳居山三十餘載入定觀心妙達真體故其言語不是造作寶自胸襟渾然流出者也讀其山居諸偈綽有寒山子之遺風以及上堂示衆諸語一皆切直諦當有足警發於人豈學語者可以意識而模倣之哉嗚呼古道瀾倒之秋邪説方熾寥寥宇宙作者無聞安得起斯人於寂光淨居而共論茲事焉洪武十五年歲在壬戌春三月前景德靈隱禪寺住山沙門釋豫章來復序嘗聞佛道不在文言豈離文言而具佛道衆生不能證佛諸佛未曾分別衆生乃佛入衆生不覺衆生至佛不修故曰一坑無異土源流即是水譬喻風水相投不期而偶水無風而不波風無水而不浪風體本無其形入水成章池水定靜衡平迎風鼓動水風兩無交涉動靜之相安在直示不二法門生佛了歸一體入於圓宗方為斯旨道不在文言三藏至今不絶流行萬世教是證宗之理文謂宗入教宗是達教之體詮謂教明宗後學之要必不可少乎然古人機窅唾露泄滲往來普引後賢心解力濃䇿警行踐緣至一旦廓然而徹乃化上行之衣傳綿延後代續祖燈之源流諦信拈提今石屋語録近世者希先德歸去時遙迹遺墨流閲其文字知古衷言不可輕為者老古錐三十年居山足不入閫盡忘塵曉清志堅淡利不干懷舍片雲消歸靈岫演半偈襟胸月朗開毫裂天河濬川無際湧一泉智水流出寶藏逝遊峰頂清逍雲外實非抱息寒禪枯根未絶豈是坐井觀天不知方外此老真為如來的派源流一氣法末也因清堅大師仰古道風聞悅怡暢欣覓不勝久望刊流後攬一本翻刻承布若於斯文普願嘗夫便覺出廣長舌行人道曲履步咸正有智踏無為之鄉無慮超乘戒之急世色易辨一相難分特使無知無所不知希逢者也願樂欲聞光緒十三年重刻石屋語録間居月塘鄉野謹序
