body:
  text: 參學門人至柔等編山居詩余山林多暇瞌睡之餘偶成偈語自娛紙墨少便不欲紀之雲衲禪人請書蓋欲知我山中趣向於是靜思隨意走筆不覺盈帙故掩而歸之復囑慎勿以此為歌詠之助當須參意則有激焉吾家住在霅溪西水滿天湖月滿溪未到盡驚山險峻曾來方識路高低蝸涎素壁粘枯殻虎過新蹄印雨泥閒閉柴門春晝永青桐花發𦘕胡啼柴門雖設未甞關閒看幽禽自往還尺壁易求千丈石黃金難買一生閒雪消曉嶂聞寒瀑葉落秋林見遠山古栢煙消清晝永是非不到白雲間荒塚纍纍沒野蒿昔人未葬盡金腰有求莫若無求好進步何如退步高貪餌金鱗終落釜出籠靈翮便冲霄山翁不管紅塵事自種青麻織布袍紙窓竹屋槿籬笆客到蒿湯便當茶多見清貧長快樂少聞濁富不驕奢看經移案就明月供佛簪瓶折野花盡說上方兜率好如何及得老僧家道在人弘孰可憑發言須與行相應貪心似海何時足妄念如苗逐日增幾樹梅花清處士一園芋子樂間僧而今隨例菴居者見道忘山似不曾動則乖真靜則差非思量處更誵訛無心未合祖師意有念盡為煩惱魔矮屋朝陽寒氣少踈籬種菊晚香多白雲曳曳方拖練又被風吹過綠蘿松下雙扉冷不扃一龕金像照青燈眠雲野鹿驚回夢落㵎獼猴墜折藤得意看山山轉好無心合道道相應多時不向門前去蘚葉苔花積幾層三十餘年住崦西钁頭邊事不吾欺一園春色熟茶笋數樹秋風老栗梨山頂月明長嘯夜水邊雲煖獨行時舊交多在名場裏竹戶長開待阿誰翠竇丹崖列四傍茅菴恰好在中央一身布衲衣裳煖百念消融歲月忘石瘦種來蒲葉細土深迸出笋芽長有時夜半聞鐘磬知有招提在下方莫謂山居便自由年無一日不懷憂竹邊婆子長偷笋麥裏兒童故放牛栗蟥地蠶傷菜甲野猪山鼠食禾頭施為便有不如意只得消歸自己休菴住霞峰最上頭巖崖𡾟嶮少人遊擔柴出市青苔滑負米登山白汗流口體無厭宜節儉光陰有限莫貪求老僧不是閒忉怛只要諸人放下休嘯月眠雲二十年自憐衰老見時艱烏來索飯生臺立僧去化糧空鉢還鰕蜆人爭撈白水钁鉏我且斸青山黃精食盡松花在不著閒愁方寸間幽居自與世相分苔厚林深草木薰山色雨晴常得見市聲朝暮罕曾聞煑茶瓦竈燒黃葉補衲巖臺剪白雲人壽希逢年滿百利名何苦競趨奔入得山來便學呆尋常有口懶能開他非莫與他分辨自過應須自剪裁瓦竈通紅茶已熟紙窓生白月初來古今誰解輕浮世獨許嚴陵坐釣臺溪淺泉清見石沙屋頭無角寄藤蘿夜深月下長猿嘯苔厚巖前少客過庭竹欹斜春雪重嶺梅消瘦夜寒多寥寥此道非今古徒把甎來石上磨白髮禪翁久住菴衲衣風捲破襤毿溪邊掃葉供爐竈霜後苦茆覆橘柑本有天真非造化現成公案不須參豁開戶牗當軒坐盡日看山不下簾臥雲深處不朝天只在重巖野水邊竹榻夢回窓有月砂鍋粥熟竈無煙萬緣歇盡非除遣一性圓明本自然湛若虗空常不動任他滄海變桑田岳頂禪房枕石臺白雲飛去又飛來門前瀑布懸空落屋後山巒起浪堆素壁淡描三世佛瓦瓶香浸一枝梅下方田地雖平坦難及山家無點埃大道從來無盛衰未明大道著便宜聖賢隱伏當斯世邪法流行在此時痛䇿諸根休自縱常存正念莫他為人身一失袈裟下萬劫千生不復追破屋蕭蕭枕石臺柴門白日為誰開名場成隊挨身入古路無人跨脚來深夜雪寒唯火伴五更霜冷只猿哀袈裟零落難縫補收捲雲霞自剪裁人壽相分一百年有誰能得百年全危如茅草郎當屋險似風波破漏船流俗沙門真可惜貪名師德更堪憐寥寥世道今非昔日把柴門緊閉關綠霧紅霞竹徑深一菴終日冷沉沉等閒放下便無事著意看來還有心古鏡未磨含萬象洪鐘纔扣發圓音本源自性天真佛非色非空非古今優游靜坐野僧家飲隨緣度歲華翠竹黃花閒意思白雲流水淡生涯石頭莫認山中虎弓影休疑盞裏蛇林下不知塵世事夕陽長見送歸鴉滿頭白髮瘦稜層日用生涯事事能木臼秋分舂白术竹筐春半曬朱藤黃精就買山前客紫菜長需海外僧誰道新年七十七開池栽藕種茭菱卜得重巖遠市朝柴門半掩草蕭蕭是誰白髮貧無諂那箇朱門富不驕急債莫於寬裏做妄情須是靜中消白雲也道青山好夜夜飛來伴寂寥風檣來往塞官塘站馬如飛日夜忙冐寵貪榮謀仕宦貪生重利作經商人間富貴一時樂地獄辛酸萬刧長古往今來無藥治如何不早去修行入此門來學此宗切須仔細要推窮清虗體寂理猶在忖度心忘境自空樹挂殘雲成片白山銜落日半邊紅是風動耶是幡動不是幡兮不是風客愛幽閒到竹籬逢仰應恕禮全虧滿頭白髮髼鬆聚一頂袈裟撩亂披黃葉火殘終夜後青猿聲斷五更時擁衾相對蒲團坐各自忘言契此機百歲光陰過隙駒幾人於此審思惟己躬下事未明白生死岸頭真嶮𡾟衲定線行嬌婦淚飯香玉粒老農脂莫言施受無因果因在果成終有時自入山來萬慮澄平懷一種任騰騰庭前樹色秋來減檻外泉聲雨後增挑薺煑茶延野客買盆移菊送鄰僧錦衣玉食公卿子不及山僧有此情是身壽命若浮漚只好挨排過了休事欲稱情常不足人能退步便無憂衰榮可踰花開落聚散還同雲去留我已久忘塵世念頹然終日倚岑樓自覺從前世念輕老來任運樂閒情芒鞋竹杖春三月紙帳梅花夢五更求佛求仙全妄想無憂無慮即修行松風昨夜熾然說自是聾人不肯聽逐日挨排過了休明朝何必預先憂死生老病難期約富貴功名不久留湖上朱門縈蔓草㵎邊遊徑變荒丘所言皆是目前事只是無人肯轉頭白髮頭陀老病侵住來茅屋幾年深消磨本有凡情執析蕩今從聖量心百鳥不來山寂寂萬松長在碧沉沉分明空刧那邊事一道神光自古今競利奔名何足誇清閒獨許野僧家心田不長無明草覺苑長開智慧華黃土坡邊多蕨笋青苔地上少塵沙我年三十餘來此幾度晴窓映落霞我本禪宗不會禪甘休林下度餘年鶉衣百結通身挂竹篾三條驀肚纏山色溪光明祖意鳥啼花笑悟機緣有時獨上臺磐石午夜無雲月一天四十餘年獨隱居不知塵世幾榮枯夜爐助煖燒松葉午鉢充饑摘野蔬坐石看雲閒意思朝陽補衲靜工夫有人問我西來意盡把家私說向渠蠆尾狼心滿世間爭先各自使機關百年能得幾回笑一日曾無頃刻間車覆有誰知改轍禍來無地著羞慚老僧不是多饒舌要與諸人揭盖纏烏兔奔忙不暫停巖居忽爾到頺齡氷邊行道影偏瘦松下看山眸轉青紅葉旋收供瓦竈黃花時採插銅瓶勞生好飲利名酒昏醉無由喚得醒茅屋青山綠水邊往來年久自相便數株紅白桃李樹一片青黃菜麥田竹榻夜移聽雨坐紙窓晴啟看雲眠人生無出清間好得到清間豈偶然古人為道入山中日用工夫在己躬添石墜腰舂白米擕鉏帶雨種青松擔泥拽石何妨道運水搬柴好用功軃懶借衣求食者莫來相伴老禪翁萬物生成感宿根己長彼短不須論一團猛火利名路三尺寒氷佛祖門草莽荊榛狐窟宅雲霄蓬島鶴乾坤滿頭白髮居巖谷幾度凭欄到日曛巖居我本為修行不許人知每自評道性淳和餘習盡覺心圓淨照功成種松鉏菜一身健補衲翻經兩眼明世異事殊真好笑避秦亦得隱山名歷遍乾坤沒處尋偶然得住此山林茅菴高插雲霄碧蘚逕斜過竹樹深人為利名驚寵辱我因禪寂老光陰蒼松恠石無人識猶更將心去覔心年老心閒身亦閒掃除一榻臥松間巖扄幽寂自為喜世路崎嶇人轉頑風煖野禽聲𤨏碎日斜華藥影闌珊藜羮粟飯家常有不用持盂更下山清晨汲水啟柴門看見天空四斂氛黃獨火香思懶攢碧桃花謝悟靈雲林間猿鶴慣曾見世上衰榮杳不聞幾度坐來苔石煖好山直看到斜曛白雲深處結茅廬隨分生涯樂有餘未死且留煨芊火息機何必絕交書湛然凝寂通三際廓爾圓明褁十虗菴內不知菴外事幾番花落又還敷細把浮生物理推輸贏難定一盤碁僧居青嶂閒方好人在紅塵老不知風颺茶煙浮竹榻水流花瓣落青池如何三萬六千日不放身心靜片時恁麼徹底恁麼去放下從頭放下來兩片唇皮堆白醭一條古路長蒼苔雲邊木馬飛如電海底泥牛吼似雷雪覆萬峯晴月夜暗香春信到寒梅清貧長樂道人家日用頭頭自偶諧昨夜西風吹古木天明滿地是乾柴霞飄素煉粘丹壁露滴真珠綴綠崖活計從來隨現定不勞辛苦去安排了了常知似不知翛然如兀又如癡旋乾倒嶽鎮長靜一念萬年終不移有耳聽聲風過樹無心應物月臨池休言我獨能明了此事人人盡可為計拙慙虧應世才聰明無分占癡呆自言境物皆虗幻誰解資財盡倘來黃葉隨流閒去住白雲橫谷謾徘徊雙眸合却方纔好為愛青山又放開圓顱方服作沙門便見牟尼佛子孫止惡防非調意馬忘機息見制心猿鍊魔道性真金淨涵養靈源美玉溫把手牽他行不得為人自肯乃方親紅日東升夜落西黃昏鐘了五更雞乾坤老我一頭雪歲月消磨百甕虀借地栽松將作棟喫桃吐核又成蹊寄言世上傷弓羽好向深山擇木棲法道寥寥不可模一菴深隱是良圖門前養竹高遮屋石上分泉直到厨猿抱子來崕果熟鶴移巢去磵松枯禪邊大有閑情緒收拾乾柴向地爐浮世光陰有幾何誰能挈挈又波波厨空旋去尋黃獨衲破方思剪綠荷麈尾罷拈言語斷佛經忘看蠧魚多可憐身在袈裟下趣境攀緣事似麻五言律詩道人緣慮盡觸目是心光何處碧桃謝滿溪流水香草深蛇性悅日煖蝶心狂曾見樵翁說雲邊霅晝房一钁足生涯居山道者家有功惟種竹無暇莫栽華水碓夜舂米竹籠春焙茶人間在何處隱隱見桑麻時時自解顏年老得安間心下渾無事眼前惟有山天空鵬翥翼霧重豹添斑獨與梅花好相期盡歲寒萬緣休歇罷一念絕中邊盡日閒閒地長年坦坦然山空雲自在天淨月孤圓磨煉工夫到難同知解禪巖臺舒野望依約見松門唐代高僧寺宋朝丞相墳溪光晴瀉遠野色晚來昏山路歌聲絕樵歸煙火村屈曲黃泥路團圝紫槿籬紙窓開竹屋瓦竈爇松枝平澹忘懷處蕭然絕照時何人能似我無事亦無為深山僧住處端的勝蓬萊地上並無草園中却有梅閒多諸想滅靜極自心開一頂破禪衲和雲曬石臺一陣從何起颼颼徧九垓𢷾他林木動吹我竹門開本自無形段如何有去來欲窮窮不到一虎笑巖臺霞霧山頭頂雲邊闞小房夏凉窓近竹冬煖閤朝陽繭紙衣裳軟山田粥飯香此生隨分過無可得思量一钁足生涯長年飽水柴有山堪寓目無事可干懷嵐氣濕茅屋苔痕上土堦任緣終省力渾不用安排山厨修午供泉白似銀漿羮熟筍鞭爛飯炊粳米香油煎清頂蕈醋煑紫芽薑百味皆難及何須說上方真空如湛海微動即成漚纔受形骸報便懷衣食憂識情奔野馬妄念走狂猴不悟空王旨輪迴卒未休山家八月天時物自相便荳莢新垂隴稻花香滿田割茅修舊屋斫竹覓清泉世上誰知我優游樂晚年茆菴竹樹間塵世不相關門對一池水窓開四面山煙熏茶竈黑塺蒸布裘斑不悟空王法緣何得此閒紅日半銜山柴門便掩關綠蒲眠褥軟白木枕頭彎松月來先照溪雲出未還迢迢清夜夢不肯到人間扶杖出松林間行上翠岑鶴羣衝鶻散樹影落溪沉野果棘難採藥苗香易尋澹烟斜日暮紅葉半巖陰好山千萬疊屋占最高層減塑三尊佛長明一椀燈鐘敲寒夜月茶煑石池冰客問西來意惟言我不能取捨與行藏人生各有方乾坤容我懶名利使他忙背日鷗眠埠營窠燕遶梁情迷隨物轉不得悟空王結草便為菴年年用覆苫紙窓松葉暗竹屋蘚華粘麥飯惟饒火藜羮不點鹽生涯隨分過誰管世人嫌七言絕句凄凄茅舍新秋夜白荳花開絡緯啼山月如銀牽老與閒行不覺過峰西滿山筍蕨滿園茶一樹紅花間白花大抵四時春最好就中猶好是山家有人問我何年住坐久纔方省得來門外碧桃親手種春光二十度花開厭煩勞役愛安閒箇樣如何居得山百丈已前巖穴士生涯全在钁頭邊年老菴居養病身日高猶自未開門怕寒起坐燒松火一曲樵歌隔塢聞童子未曾歸動火水雲早已到投齋山菴喜免征徭慮賸種青松只賣柴玉堂銀燭笙歌夜金谷羅幃富貴家爭似道人茅屋下一天晴月曬梅花相逢盡說世途難自向菴中討不安除却淵明賦歸去更無一箇肯休官山厨寂寂斷炊煙凍鎖泉聲欲雪天面壁老僧無定力又思乞食到人間種了冬瓜便種茄勞形苦骨做生涯眾人若要厨堂好須是園頭常在家粥去飯來何日了日生月落幾時休都來與我無干涉空起許多閒念頭屋後青松八九樹門前紫芋兩三疄山居道者機關少家火從頭說向人此事誰人敢強為除非知有莫能知分明月在梅花上看到梅花早已遲過去事已過去了未來不必預思量只今便道即今句梅子熟時梔子香一日打眠三五度也消不得許多閒循環數遍琅玕竹又出青松望遠山攀緣起倒易消停卒急難除是愛憎我笑青山高突兀青山嫌我廋陵層真空湛寂惟常在不覺良田妄所真性何曾離妄有花開花落自春風天湖水湛琉璃碧霞霧山圍錦幛紅觸目本來成現事何須叉手問禪翁年老氣衰真箇懶晨朝更不見和南客來無語相抵對辛苦空勞到草菴老去一身都是懶閑來百念盡成灰與兄相見略彈指無柰人情強接陪田地無塵長不掃柴門有客扣方開雪晴斜月侵簷冷梅影一枝窓上來茅屋低低三兩間團團環遶盡青山竹牀不許閒雲宿日未斜時便掩關禪兄何事到煙蘿老我生涯苦不多巖下木樨香滿樹園中菜甲綠成窠一片無塵新雨地半邊有蘚古時松目前景物人皆見取用誰知各不同萬境萬機俱寢息一知一見盡消融閒閒兩耳全無用坐到晨雞與暮鐘巖房終日寂寥寥世念何曾有一毫雖著衣裳喫粥飯恰如死了未曾燒新縫紙被烘來煖一覺安眠到五更聞得上方鐘皷動又添一日在浮生門前枯木似人立屋後好山如浪堆老我為人無可說高高雲路賺兄來山形凹凸路高低石占雲頭屋占蹊地窄栽來蔬菜少又營小圃在橋西百千日月閒中度八萬塵勞靜處消綠水光中山影轉紅爐焰上雪花飄西方有路不肯去地獄無門鬬要過金閣銀臺仙子小鑊湯爐炭罪人多著意求真真轉遠擬心斷妄妄猶多道人一種平懷處月在青天影在波要求作佛真箇易唯斷妄心真箇難幾度霜天明月夜坐來覺得五更寒萬緣脫去心無事諸有空來性坦然幾度夜窓虗吐白月和流水到門前一事無心萬事休也無歡喜也無憂無心莫謂便無事尚有無心箇念頭於事無心風過樹於心無事月行空風聲月色消磨盡去却一重還一重新年頭了舊年尾明日四兮今日三道業未成空白首大千無處著羞慚白髮催人瘦入肩住來茅屋已多年裩無腰帶袴無口一領褊衫沒半邊一軸楞伽看未周夕陽斜影水東流雲歸自就茅簷宿一日光陰又早休茅簷雨過日頭紅瞬息陰晴便不同況是死生呼吸事黃昏難保聽朝鐘明明見了非他見了了常知無別知記得去秋烟雨裏猿來偷去一雙梨半窓松影半窓月一箇蒲團一箇僧盤膝坐來中夜後飛蛾撲滅佛前燈長年心裏渾無事每日菴中樂有餘飯罷濃煎茶喫了池邊坐石數游魚飯炊五合陳黃米羮煑數莖青薺苗淡薄自然滋味好何須更要著薑椒移家深入亂峯西烟樹重重隔遠溪年老心閒貪睡穩猒聞鐘響與雞啼山風吹破故窓紙片片雪花飛入來添盡布裘渾不煖拾枯深撥地爐灰半窓斜日冷生光破衲蒙頭坐竹床枯葉滿爐燒焰火不知屋上有寒霜幾樹山花紅灼灼一池春水綠衲僧若具超宗眼不待無情為發機雲未歸時便掩扄柴床眠穩思冥冥山家不養雞和犬日到茅簷夢未醒粥去飯來茶喫了開窓獨坐看青山細推百億閻浮界白日無人似我閒黑霧濃雲撥不開忽然去了忽然來任他伎倆自磨滅紅日依前照石臺一天紅日曉東南自拔青苗插瘦田布裰半沾泥水濕歸來脫曬竹房前喫桃吐核核成樹樹大花開又結桃春去秋來知幾度爭教我不白頭毛茅屋方方一丈慳四簷松竹四圍山老僧自住尚狹窄那許雲來借半間臨機切莫避刀鎗𢬵死和他戰一場打得趙州關子破大千無處不歸降有限光陰一百年幾人得到百年全縱饒百歲終歸死只是相分後與前一大藏經閒故紙一千七百葛藤窠誰能去討他分曉起箇念頭猶是多溪邊黃葉水去住嶺上白雲風往來爭似老僧常不動長年無事坐巖臺霞霧山高路又遙菴居從蕳蔑三條却嫌住處太危險落賺多人登陟勞老覺形枯氣力衰客來勉強出支陪自憐不解藏踪跡松食荷衣憶大梅道人屋冷四簷竹長者門高百尺墻屋冷道人心愈靜門高長者日多忙盡道凡心非佛性我言佛性即凡心工夫只怕無人做鐵杵磨教作線針南北東西去復還陸行車馬水行船利名門路如天遠走殺世間人萬千居山那得有工夫種了冬瓜便種瓠設使一毫功不及許多田地盡荒蕪離眾多年無坐具入山長久沒袈裟單單有箇鐵鐺子留待人來煑瀑花布衣破綻種青麻糧食無時刈早禾辛苦做來牽補過復身免得報檀那飯香麥和松粉菜好藤花雜筍鞭我已盡形無別念任他作佛與生天山居活計钁頭邊衣食須營豈自然種稻下田泥沒膝賣柴出市檐磨肩钁頭添鐵屋頭懸徤即鋤雲倦即眠紅日正中黃獨熟甘香不在火爐邊團團一箇尖頭屋外面誰知裏面寬世界大千都著了尚餘閒地放蒲團草菴盤結長松下面面軒窓盡豁開目對青山終日坐更無一事上心來深秋時節雨霏霏蘚葉層層印虎蹄一夜西風吹不住曉來黃葉與階齊團團紅日上青山竹屋柴門尚閉關白髮老僧眠未起勞生磨蟻正循環山舍清幽絕點塵心閒與世自相分不知何處碧桃放幽鳥銜來遶竹門老來無事可千懷竹榻高眠日枕斜夢裏不知誰是我覺來新月到梅花禪餘高誦寒山偈飯後濃煎谷雨茶尚有閒情無著處携籃過嶺採藤花僧因產業致差科官府勾追恥辱多我有山田三畆半盡情回付與檀那楮閣安爐種炭團床鋪新薦被新棉一冬暖活如何說夢想不思兜率天去年家火缺支持家火今年用不虧田裏多收三斗糓門前添得一方池白雲影裏尖頭屋黃葉堆頭折脚鐺漏笊籬撩無米飯破砂盆擣爛生薑修行豈得不成佛水滴年深石也穿不是頑皮鑽不破惟人只欠自心堅獨坐窮心寂杳冥箇中無法可當情西風吹盡擁門葉留得空堦與月明玉蝶梅花香滿樹水池洗菜綠浮科錦衣公子如知得定是移家入薜蘿逆順未嘗忘此道窮通一味信前緣是他了達虗空性不動纖毫本自然寒披荷葉衣裳暖饑食松華餅餌香不比世人營口體奔南走北一生忙新縫紙被暖烘烘黃葉堆頭火正紅閒夢不知誰喚醒五更聽得下方鐘旋斫青柴逐把挑擔頭防脫莫過腰今朝未保來朝日且了寒爐一夜燒今年難測是寒暄一日陰晴變幾番簷下紙窓乾又濕門前石逕濕還乾峰頂團團盡是松茅廬著在樹陰中天風一陣來何處吹起波濤響半空黃羅直裰紫伽梨出入矦門得意時爭似道人忘寵辱松針柳線補荷衣春歸暑退一秋凉日如梭夜漸長盡把工夫閒雜話幾曾回首暫思量我見時人日夜忙廣營屋宅置田莊到頭一事將不去獨有骷髏葬北邙箇箇聞知有死生聞知何不早修行堂堂大道無人到開眼明明入火坑盡說修行不在遲今生還有後生期三塗一報五千劫出得頭來是幾時歌山名霞幕泉天湖卜居記得壬子初山頭有塊臺磐石宛如出水青芙蕖更有天湖一泉水先天至今何曾枯就泉結屋擬終老田地一點紅塵無外面規模似狹窄中間取用能寬舒碧紗如煙隔金像雕盤沉水凌天衢蒲團禪椅列左右香鐘雲板鳴朝晡甆罌土種吉祥草石盆水養龍湫蒲飯香粥滑山田米瓜甜菜嫩家園蔬得失是非都放却經行坐臥無相拘有時把柄白麈拂有時持串烏木珠有時歡喜身舞蹈有時默坐觜盧都懶舉西來祖意說甚東魯詩書自亦不知是凡是聖他豈能識是牛是驢客來未暇陪說話拾枯先去燒茶爐紅香𭥃旎春華開敷清陰繁茂夏木翳如巖桂風前喚回山谷梅花雪裏清殺林逋人間無此真樂山中有甚凶虞也不樂他輕輿高盖也不樂他率眾匡徒也不樂他西方極樂也不樂他天上淨居心下常無不足目前觸事有餘夜籟合樂曉天昇烏戲魚翻躍好鳥相呼路通玄以幽遠境超世而清虗騷人盡思吟不成句丹青極巧𦘕不成圖獨有淵明可起予解道吾亦愛吾廬山中居沒閒時無人會惟自知遶山驅竹筧寒水擊石取火延朝炊香粳旋舂柴旋斫砂鍋未滾涎先垂開畬未及種紫芋鉏地更要栽黃箕白日不得手脚住黃昏未到神思疲歸來洗足上床睡困重不知山月移隔林幽鳥忽喚醒一團紅日懸松枝今日明日也如是來年後年還如斯春草離離夏木葳葳秋雲片片冬雪霏霏虗空落地須彌碎三世如來脫垢衣晴明無爭登霞峰伸眉望極開心𮌎太湖萬頃白灔洞庭兩點青濛茸初疑仙子始綰角碧紗帽子參差籠又疑天女來獻花玉盤捧出雙芙蓉明知此境俱幻妄對此悠然心未終徘徊不忍便歸去夕陽又轉山頭松乾鵲傍簷鳴鵲唶烏鴉遶屋聲鴉啞西菴道者來送果東鄰稚子去偷瓜吉凶占相既有驗罪福果報應無差道人若有此見解青銅鏡面生痕瑕懶融一見四祖後百鳥更不來銜花林木長新葉遶屋清陰多深草沒塵跡隔山聽樵歌自畊還自種側笠披青簑好雨及時來活我新栽禾遊目周宇宙物物皆消磨既善解空理不樂還如何寒山曾有言吾心似秋月我亦曾有言吾心勝秋月秋月非不明有圓復有缺安得如我心圓明常皎潔有問心如何教我如何說月來照我門風來吹我襟勸君石上坐聽我山中吟玄𩬆化為雪朝光成夕陰萬事草頭露豈得長如今飯飽抱石睡睡足起閒行靄靄孟夏景新樹鳴黃鶯俯仰玩時物散誕暢吟情只此是真樂何必求虗名小不讀佛書大不識玄旨焉知百萬門只在方寸裏終日恣貪嗔幾時念生死一朝老病來懊惱亦徒爾種豆兩三畦離離覆原上不知陽和功惟言土力壯老兔伏崖根心心欲希望果能息汝貪我寧不食醬山中一雨滋原上百物好手種三畆薯亦可延昏早咄哉世間人名利常關抱頭上雪紛紛𮌎中塵浩浩結屋荒山巔隨緣度朝夕賣柴糶米歸煑粥做飯喫雖是勞形骸且免當戶役說妙與談玄箇却曉不得放下全放下佛也莫要做動念即成魔開口便招禍飲但隨緣只麼閒閒過執法去修行牽牛來拽磨破屋三兩椽住在千峰上雲散天空清放目聊四望世界空裏花起滅皆虗妄日落山風寒閉門燒火向結屋霞峰頭耕鉏供日課山田六七坵道人二兩箇開池放月來賣柴糴米過老子少機關家私都說破兩箇窮道人三間弊漏屋開得一坵田收得半擔穀煑粥儘有餘做飯却不足也勝利名人奔南又走北偈讚示眾偈說是說非何日了無明海濶我山高修身如未清三惑凡事須當滅一毫閒靜光陰空過了現成粥飯若為消慇懃說向諸禪客莫把袈裟換羽毛送東林院主歸華亭參禪人須猛烈吹毛劍白雪雪佛來與祖來拈起當頭截雲中木馬驚嘶山上鯉魚出血萬仞崖頭奏凱歸等閒踏破華亭月送慶侍者回里省師汝師年老中山寺朝暮無人可瞻侍不歸掃灑執巾瓶師資禮法合也未汝母兼又年紀高除汝一人更無二望斷秋風未見歸倚門日日長垂淚離師棄母入山來所圖畢竟成何事安貧樂道固所難住箇茆菴豈容易也要種竹栽松也要鉏山掘地也要運水搬柴也要澆蔬灌芋也要行道諷經也要攝心除睡藜羮黍飯塞饑瘡淡虀薄粥通腸胃人生皆為口體忙我亦未免形骸累自家心地如未明業識茫茫無本據水邊林下暫經過吾汝皆非久居計月江和尚有書來勉汝歸來有深意開緘未讀便抽身不負來音全孝義有言孝為百行先在俗在僧誰不然侍師奉母名敬田何須入眾并參禪忽然思靜又嫌喧短䇿不妨閒往還海都寺求語急急做工夫單提狗子無脊梁高豎起屹似須彌盧翻來覆去看要了此公案瞥然妄念生便逐他使喚精進不懈怠坐立道可待懶惰又昏沉驢年也未在若也放得下無可無不可千七百葛藤盡是敲門瓦留進菴主丹陽進禪人隨我住有日雖立志參禪未曾有所入菴中諸事務渾不憚勞役口體甘淡薄身心頗真實一朝拜我前請語為法則我寫此數言助汝進道力只就我山居隨緣度朝夕莫學野盤僧東西與南北尋常動用中精進莫放逸剔起眉毛看畢竟是何物看破看的人大事方了畢示居士劉鐵壁見性成佛無別佛古人說話最條直當頭坐斷沒纖毫切忌隨他言語覔縱饒虗妄百千般究竟還歸一真實老僧吐露真實情寄與雲間劉鐵壁山中四威儀山中行信步慢騰騰攀蘿去又上一崚嶒山中住幾度朝還暮手栽松陰凉成大樹山中坐飄飄黃葉墮沒人來閉門燒焰火山中臥松風穿耳過沒來由好夢都吹破重巖之下十首重巖之下火種刀耕有粟有蔬可煑可烹了我目前樂我餘生坐盻庭柯幾度衰榮重巖之下希古為儔徹證本根一了便休紛紛玄徒念死話頭待兔守株求劍刻舟重巖之下草莾日交人影不來黃葉飄飄谷鳥晚啼山月夜高松露鶴飛濕我禪袍重巖之下蛇虎為鄰我心既忘彼性亦馴人生在世各具天真含齒戴髮胡為不仁重巖之下未透本根觸境逢緣擾擾紛紛應須悟理超越見聞久久自然左右逢原重巖之下靜默自居三際不來心如鏡如斜月半窻殘火一爐嗟彼睡夫蝶夢蘧蘧重巖之下皤然一叟裰兮無邊袴兮無口夜入禪那晝勤隴畆道在其中別更何有重巖之下目對千山一根返源六處皆閒白雲飄飄綠水潺潺動靜自忘別是人間重巖之下不修形骸木食草衣布襪筍鞋竹密暗窻苔深覆堦蕭焉忘情寂爾虗懷重巖之下飽飯熟眠縱情放逸歲月虗延老病時臨眾苦交煎臨渴掘井熱悶徒然次韻送智西堂歸靈隱一榻平分鑑古軒爐熏相對坐忘眠山林禮樂無今昔時節因緣有變遷樹影高低深夜月𤠔聲長短五更天兩冬不得梅花信又約梅華到冷泉會趙初心提舉老來脚力不勝鞋竹杖扶行步落華待月伴雲眠蘚石尋梅陪客過隣家粥香瓦鉢山田米雪汎甆甌水磨茶今日為翁時蹔出此心長只在烟霞別南山經室屋借雲邊兩載居晴原無事便携鉏和香採得隣家菊趂嫩挑來自種蔬秋殿寂時山磬歇夜窻虗處柏烟疎明朝又向他山去何日重來讀梵書秋日秦川道中處處西風葉落頻偶歸湖寺蹔容身故人十有幾人在世事萬無一事真擾擾勞生同作夢明明果報各由因余諳此理能消遣終不隨他自損神偶作今年七十七頺齡血氣潛消老病增踏雪探梅知履重挑雲過嶺覺肩疼光陰別去忙如箭世念消來冷似氷却憶向時遊岳洞兩三回上最高層冬至昨宵冬至一陽生萬物欣欣盡向榮鐵樹華開紅朵朵石田筍出綠莖莖人間化日纔添線竹外幽禽便轉聲白髮老僧窻下坐爐香多誦兩行經却南州提舉再招自嗟業繫在娑婆一度尋思一嘆嗟世上多逢人面虎山中少見佛心蛇禦寒補衲裁荷葉遣睡煎茶煑瀑華老拙背時酧應懶不能從命出烟霞雪中示徒六出飄飄入夜多灑窓相似撲燈蛾山家富貴銀千樹漁父風流玉一蓑深徑絕無樵子語陰崖却有獵人過菴前黃獨無尋處唯見寒梅數朵華送皐侍者侍者參得禪了也萬兩黃金也合消世上豈無千里馬人間難得九方臯送漆匠裏面盡情灰得了外頭方始好揩磨雖然本有靈光在也要工夫發用他送真藏主禮育王鴈蕩天台華頂峰鄮山乳寶接天童徧遊元不離雙足盡在摩尼一點中送就禪人禮祖人人有具黃金骨何必諸方禮塔頭堪笑丹陽就禪者春深物自浙東遊送松江深上人參方禮祖外邊事一著工夫在己躬親覲阿師秋已半樹彫葉落露金風送椿上人禮普陀寒潮日夜吼雷音耳聽何如眼聽親小白華巖觀自在頻伽聲裏現全身示禪上人古今無法可傳流只要偷心死便休大抵是他人自肯福源不會按牛頭送雪峯維那留香堂裏十聲佛驚倒江西馬簸箕八十四人扶不起維那歸去莫教遲送人遊五臺去去臺山最上層文殊合掌咲相迎巖前有箇金獅子顛倒騎歸與老僧送針工手携刀尺走諸方線去針來日日忙量盡別人長與短自家長短幾曾量示真副寺坐圓覺期百日期中痛著鞭工夫到處話頭圓多生業障俱消滅佛境分明在目前送實監寺回大覺楊岐骨格氣雄雄一夏相忘寂寞中秋至思歸天目去竹房閒掩聽松風送愆上人回鄉孤身行脚緣何事䇿杖歸鄉有底忙白業不修禪不會可憐空過好時光送德都寺回里德雲不在妙峯頂却向別山相見來從此罷休行脚念坐看心地覺華開送真侍者幾年入眾為參禪三喚機緣未倒邊再去諸方重請益却來這裏喫麤拳送福上人禮祖祖師塔是鶻崙磚只在山邊與水邊一一從頭巡禮徧草鞋依舊自還錢示來上人看水看山何日了奔南走北幾時休可憐身在袈裟下道業未成先白頭送淨髮待詔二首結緣待詔到山中廊下諸僧盡整容方丈老人何不剃要留白髮過隆冬又剃了又長長又剃一年幾度遠煩過大夫只管來求福我福如何有許多送圓上人玅淨圓明全軆現不須來問我如何正因行脚禪和子知解何曾有許多送問上人歸大乘一句明明向汝道冷如猛火熱如氷上人若不信我說急急回歸問大乘送人之五臺短䇿輕包上五臺銀樓金閣正門開文殊相見喫茶了收取玻瓈盞子來送門上人夏在大乘堂裏住冬初來扣福源門莫嫌老我無言說一曲漁歌隔岸聞送明道者工夫不到不方圓心若堅時石也穿不見頭陀老迦葉意根滅盡領金襴送大維那省母桶篐𪹼處見根源熟路重行三月天日暖北堂萱草綠對娘莫說老婆禪示茂道者作佛生天容易事最難難是做頭陀勞形枯骨安閒少運水搬柴普請多示道人自遠相尋到鵝湖慇懃請問做工夫老僧真實為人說出處伽陀一字無送勤上人勤求警䇿做工夫散亂昏沉盡掃除後夜黑雲消散盡長天如水月輪孤示禪人二首終日騎牛不識牛何須辛苦外邊求只消驀鼻牽來看便是尋常這一頭參得趙州無字透玄關金鎻盡開通三更月下泥牛吼八面玲瓏海日紅英上人求語客冐春寒訪隱扄衲衣猶綴雪華輕坐來出示諸方語錦軸未開先眼明送維那之江西上人壯志出叢林一寸光陰一寸金莫把世間閒學解等閒埋沒祖師心送凌侍者回淨慈十里湖光浸六橋到時須著眼頭高斷堤風暖楊華落不是鳥窠吹布毛送觀侍者放下身心返自觀略無毫髮許相瞞雲收霧捲乾坤闊月上青山玉一團示勒道者一片荒田一把鋤翻來覆去用工夫一鋤翻得春風轉也有瓜茄也有瓠示眾念未生時猶妄覺瞥興一念便傷他工夫到此切須記枯木巖前蹉路多示道者行盡東西南北州如今能得此心休俱胝只在山中住受用天龍一指頭䟦淨首座血書法華報親父是誰兮母是誰𮌎中五逆是男兒看他義斷情忘處菡萏華開三四枝常侍者血書金剛經此經在處皆有佛不勞心力更施功祇園秋晚霜華重樹葉紅於血染濃寄魁書記僧住城隍佛祖訶先賢多是隱巖阿山泉流出人間去清水自然成濁波寄淨慈平山和尚年老心孤憶弟兄中峯且喜過南屏潺潺一派雙溪水流入西湖更好聽領破蹄穿五百牛南屏寺裏一欄收皮毛換得光生也拽杷拖犁再起頭寄友二首山舍無聊夜臥遲因君記得去年時豆華棚下曾分榻月落松梢尚詠詩萬松影裏三間屋枯木巖前一箇僧三二十年如此過肯將清淡換虗名贈古樵空劫已前無影樹撑天拄地赤條條新州有箇賣柴漢收拾將來一擔挑贈無岸舉頭四望白瀰瀰南北東西竟莫知不用篙篙撑到底回頭便是上船時贈本源滔滔心地中流出低下隨宜不自高坎止流行皆末事終歸大海作波濤贈石崖千尋拔地青如玉萬丈凌雲硬似剛望見嶮𡾟多退步有誰撒手肯承當贈無敵眼空湖海氣凌雲傑出叢林思不群古往今來誰是我得饒人處且饒人贈白庵一色虗明含法界四簷皎潔若氷霜小窻幾度雪晴夜不見梅華只覺香贈別㵎湛然不入眾流數瞪目觀來果必殊但得煑茶增味好誰能泛濫落江湖贈別峯峭峻萬峯齊不得孤危眾嶽勢難同善財參見得雲處又在那邊蒼翠中真讚出山佛二首頭髮髼鬆下翠微凍雲殘雪綴伽梨不須更問山中事觀著容顏便得知肘破衣穿骨褁皮下山回首步遲遲父王休遣人來問顏貌不如宮裏時觀音大士二首童子南詢尚未回白華巖下望多時長天萬里無雲夜月在波心說向誰水即是波巖即是石坐證圓通斯為第一羅漢二首一切不為長年打坐執法修行如牛拽磨寂滅現前不見前待出定來重勘過一個渾身一瓶秋水物外生涯只這便是白眼看他世上人手捺雙趺笑而已達磨二首面黑齒缺心麤膽大梁王殿上撒沙拋土少室峰前開華結果槲葉巖臺蒙頭宴坐夫是謂之菩提達磨一言不契渡江淮熊耳峰前去活埋無限家私狼藉盡何爭一隻破皮鞋讚及菴和尚并師同幀二老比丘有何因由先覺後覺東州西州建陽山中相見時好於骨肉西峰寺裏再參後惡似冤讎從此父南子北不知雲散水流在你也報盡已歸兜率在我也業煩尚寄閻浮是非恩怨難分處一片松陰葢石頭自讚板齒生毛面孔無肉受靈山記欠人天福瘦稜稜却如碧海波心湧起一座玉巖硬剝剝好似白雲堆裏突出千尋石屋道是天湖菴主不是我同流謂是福源住持亦非吾眷屬眼裏無筋底未免向影子上胡猜亂猜皮下有血底終不向丹青上東卜西卜咦切須莫展與人看挂向閒房伴松竹禪人求讚髮白面皺皮黃骨瘦用盡自己心笑破他人口情知衰世道難行却來靜處閒叉手看天湖鵝湖二水同流對霞峰胥峰兩山並秀何緣得此優游端的自能跳透不是禪翁自點胷古今盡道蘇州有辭世偈青山不著臰尸骸死了何須掘土埋顧我也無三昧火光前絕後一堆柴福源石屋珙禪師塔銘前四明延壽禪寺沙門元旭譔師諱清珙字石屋蘇之常熟人也俗姓溫母劉氏生之夕有異光實宋咸淳八年壬申也及長依本州興教崇福寺僧永惟出家二十祝髮越三年受具一日有僧杖笠過門師問之僧曰吾今登天目見高峰和尚汝可偕行否師欣然與之偕行見峰峰問汝為何來師曰欲求大法峰曰大法豈易求哉須然指香可也師曰某今日親見和尚大法豈有隱乎峰嘿器之授萬法歸一之語服勤三年大事未明忽辭他行峰曰溫有瞎驢淮有及菴宜往見之至建陽西峰見及菴菴問何來師曰天目菴曰有何指示師曰萬法歸一菴曰汝作麼生會師無語菴曰此是死句什麼害熱病底教汝與麼師拜求指的菴曰有佛處不得住無佛處急走過意旨如何師答不契菴曰者個亦是死句師不覺汗下後入室再理前話詰之師答曰上馬見路菴呵曰在此六年猶作者個見解師發憤弃去途中忽舉首見風亭豁然有省回語菴曰有佛處不得住也是死句無佛處急走過也是死句某今日會得活句了也菴曰汝作麼生會師曰清明時節雨初晴黃鶯枝上分明語菴頷之久乃辭去菴送之門囑曰已後與汝同龕未幾菴遷湖之道場師再參次命典藏鑰菴嘗與眾言曰此子乃法海中透網金鱗也一眾刮目以視後靈隱悅堂誾公會中居第二座遂罷參登霞霧山卓菴名曰天湖道洽緇素戶屨駢臻伏臘所須不求自至凡樵蔬之役皆躬自為之有古德之風禪暇喜作山居吟傳者頗多師於此山有終焉之志俄而嘉禾當湖新創福源禪剎以師之名聞諸廣教馳檄敦請為第二代住持師堅臥不起或者勸之曰夫沙門者當以弘法為重任閒居獨善何足言哉於是翻然而起大開鑪鞴鍛鍊學者談者以謂真能起及菴之家者也居七年以老引退復歸天湖至正間朝廷聞師名降香幣以旌異皇后賜金襴衣人皆榮之師澹如也至正壬辰秋七月廿有一日示微疾閱二日中夜與眾訣其徒請曰和尚後事如何遂索筆書偈曰青山不著臰尸該死了何須掘土埋顧我也無三昧火光前絕後一堆柴擲筆而逝闍維舍利五色璨然不知其數其徒收其靈骨舍利塔于天湖之原以及菴之塔配之示不忘同龕師之意也壽八十有一臘五十有四有弟子愚太古者高麗人也親得師旨說偈印可有金鱗上直鈎之句其王以國師之號尊之聞師道行意甚傾渴表達朝廷詔諡佛慈慧照禪師移文江淛請淨慈平山林公躬入天湖取師舍利舘伴歸國平山與師為同參皆愚公之本意也師之上堂法語山居詩頌其徒至柔刊行于世且以師之行狀徵予銘之予昔見師于福源臞然其形道韻可掬今已四十餘年矣因感慨而為之銘銘曰西來直指教外別傳惟上根者乃可得焉傳亦無傳得亦無得如太虗空蕩焉罔極卷卷石屋心如死灰劃然頓悟火裏蓮開惠朗之孫及菴之子源清流長根茂實遂跡留霞霧名落湖江爭先快覩景星鳳凰入滅至今幾三十雙塔巋然清風未已
